<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin>
/* ══════════════════════════════════════════════════════
   sendToRTS(data)
   열관류율 WAP → localStorage → RTS 부하계산서 전송
   데이터 포맷: 성락교회 PDF 계산서 부위별 레이어 형식
══════════════════════════════════════════════════════ */
function sendToRTS(data) {
  const { projectName, designerName, region, part, exposure,
          usage, sr, cl, totalR, currentU, targetU, isPass, layers } = data;

  /* 재료 레이어 → 성락교회 PDF 포맷 (No/Code/Materials/THK/λ/R) */
  const layerRows = cl.map((l, i) => {
    const nameCleaned = (l.name || '').replace(/_/g,' ');
    /* 재료 코드 추출: 카테고리 앞 알파벳 */
    const catCode = (l.cat || '').replace(/[^A-Za-z]/g,'').substring(0,1).toUpperCase() || 'M';
    return {
      no:     i + 1,
      code:   catCode + String(i + 1).padStart(2,'0'),
      name:   nameCleaned,
      thk:    l.t ?? 0,          /* mm */
      lambda: l.lambda ?? 0,     /* W/mK */
      R:      parseFloat((l.r ?? 0).toFixed(4)),
    };
  });

  /* 표면저항 포함 전체 레이어 (성락교회 PDF: A03/A01 코드) */
  const isDirectExp = (exposure || '').includes('직접');
  const isRoof      = (part || '').includes('지붕') || (part || '').includes('반자');
  const roSuffix    = isRoof  ? '지붕' : '벽체';
  const riSuffix    = isRoof  ? '지붕/바닥' : '벽체';
  const roLabel     = isDirectExp ? `외부저항-${roSuffix}(직접)` : `외부저항-${roSuffix}(간접)`;
  const riLabel     = `내부저항-${riSuffix}`;

  const fullLayers = [
    { no:'외', code:'A03', name: roLabel, thk:'-', lambda:'-', R: parseFloat((sr.ro||0.043).toFixed(4)) },
    ...layerRows,
    { no:'내', code:'A01', name: riLabel, thk:'-', lambda:'-', R: parseFloat((sr.ri||0.110).toFixed(4)) },
  ];

  /* 부위 타입 분류 (RTS 계산용) */
  let compType = 'wall';
  if (isRoof) compType = 'roof';
  else if ((part||'').includes('바닥')) compType = 'floor';
  else if ((part||'').includes('창') || (part||'').includes('문')) compType = 'glass';

  /* 부위 단축명 */
  const partShort = (part||'')
    .replace('거실의 외벽','외벽')
    .replace('최상층에 있는 거실의 반자 또는 지붕','지붕')
    .replace('최하층에 있는 거실의 바닥','바닥')
    .replace('외기에 직접 면하는 경우','직접')
    .replace('외기에 간접 면하는 경우','간접');

  const payload = {
    ts:          new Date().toISOString(),
    projectName, designerName, region, part, partShort, exposure, usage,
    currentU:    parseFloat(currentU),
    targetU:     targetU || 0,
    isPass,
    totalR:      parseFloat(totalR.toFixed(4)),
    ro: sr.ro, ri: sr.ri,
    compType,
    layerRows,    /* 재료 레이어만 */
    fullLayers,   /* 표면저항 포함 전체 */
  };

  try {
    /* 누적 저장 (부위별로 쌓임) */
    let list = [];
    try { list = JSON.parse(localStorage.getItem('MANMIN_UVAL_LIST') || '[]'); } catch(_){}
    const si = list.findIndex(d => d.part === part && d.exposure === exposure);
    if (si >= 0) list[si] = payload; else list.push(payload);
    localStorage.setItem('MANMIN_UVAL_LIST',   JSON.stringify(list));
    localStorage.setItem('MANMIN_UVAL_LATEST', JSON.stringify(payload));

    const passStr = isPass ? '✅ 적합' : '❌ 기준 초과';
    if (confirm(
      `📤 RTS 부하계산서로 전송합니다.\n\n` +
      `부위: ${partShort}\n` +
      `U = ${currentU} W/m²K  ${passStr}\n` +
      `기준: ${targetU ? targetU.toFixed(3) : '—'} W/m²K\n` +
      `재료 레이어: ${layerRows.length}개\n\n` +
      `RTS 부하계산서를 새 탭으로 열겠습니까?`
    )) {
      window.open('RTS_부하계산서.html', '_blank');
    }
  } catch(e) {
    alert('전송 오류: ' + e.message);
    window.open('RTS_부하계산서.html', '_blank');
  }
}
window.sendToRTS = sendToRTS;

</script>

.rtbl tfoot td{background:#eff6ff;border-top:2px solid #93c5fd;font-weight:800;}

/* ═══ FORMULA BOX ═══ */
.fml-box-lg{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);border-radius:12px;padding:16px 22px;text-align:center;}

/* ═══ THICKNESS BADGES ═══ */
.t-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.t-badge{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 4px;text-align:center;}

/* ═══ INFO CARD ═══ */
.info-strip{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:10px 13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.info-strip svg{width:13px;height:13px;stroke:#1d4ed8;fill:none;stroke-width:2;flex-shrink:0;margin-top:2px;}
.info-strip p{font-size:10.5px;color:#1e40af;font-weight:600;line-height:1.7;}

/* ═══ BTN-ADD ═══ */
.btn-add{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0;border-radius:7px;padding:5px 11px;font-size:10px;font-weight:800;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-add:hover{background:#d1fae5;}

/* ═══ FULL-WIDTH PANEL (A4/mobile/material) ═══ */
.full-panel{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 4px rgba(15,23,42,.06);}

/* ═══ A4 PREVIEW ═══ */
.a4-preview-wrap{background:#e2e8f0;border-radius:0 0 14px 14px;padding:24px;display:flex;justify-content:center;overflow-x:auto;min-height:400px;}
.a4-preview-inner{background:#fff;box-shadow:0 6px 40px rgba(0,0,0,.18);border:1px solid #c8d0dc;border-radius:2px;}

/* ═══ MOBILE PREVIEW ═══ */
.mob-preview-wrap{background:#e2e8f0;border-radius:0 0 14px 14px;padding:28px;display:flex;justify-content:center;align-items:flex-start;overflow-x:auto;min-height:400px;}

/* ═══ MATERIAL TAB ═══ */
.mat-wrap{padding:16px;}
.mat-cat-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.mat-cat-btn{padding:6px 13px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid #dde3ed;color:#6b7a99;transition:all .15s;background:#fff;font-family:inherit;}
.mat-cat-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;}
.mat-cat-btn:hover:not(.active){border-color:#1d4ed8;color:#1d4ed8;background:#eff6ff;}
.mat-group-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8fafd;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s;font-family:inherit;width:100%;}
.mat-group-hd:hover{background:#eff6ff;}
.mat-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.mat-tbl th{background:#1d4ed8;color:#fff;padding:7px 10px;text-align:left;font-weight:700;font-size:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.mat-tbl td{padding:7px 10px;border-bottom:1px solid #eef1f6;color:#374151;}
.mat-tbl tr:last-child td{border-bottom:none;}
.mat-tbl tr:nth-child(even) td{background:#f8fafd;}
.ga-pill{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;}
.gb-pill{background:#f0fdf4;border:1px solid #a7f3d0;color:#059669;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;}
.gc-pill{background:#fefce8;border:1px solid #fde047;color:#854d0e;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;}
.gd-pill{background:#fff1f2;border:1px solid #fecdd3;color:#be123c;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;}

/* ═══ FAB ═══ */
.fab-pill{position:fixed;bottom:22px;right:18px;z-index:50;background:linear-gradient(135deg,#0c4da2,#1d4ed8);color:#fff;border:none;border-radius:16px;padding:11px 18px;cursor:pointer;box-shadow:0 4px 22px rgba(12,77,162,.55);display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;font-family:inherit;line-height:1.3;transition:transform .15s,box-shadow .15s;white-space:nowrap;}
.fab-pill:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(12,77,162,.72);}
.fab-pill:active{transform:translateY(0) scale(.97);}

/* ═══ MODAL ═══ */
.fml-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fmlFadeIn .2s ease-out;}
.fml-overlay.hidden{display:none;}
@keyframes fmlFadeIn{from{opacity:0}to{opacity:1}}
.fml-modal{background:#fff;border-radius:20px;width:100%;max-width:820px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:fmlUp .26s cubic-bezier(.34,1.5,.64,1);}
@keyframes fmlUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.fml-hd{background:linear-gradient(135deg,#081e44,#0c4da2,#1565c0);color:#fff;padding:18px 20px 0;flex-shrink:0;}
.fml-hd-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.fml-hd-title{font-size:17px;font-weight:900;letter-spacing:-.01em;}
.fml-hd-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;font-weight:600;}
.fml-close{background:rgba(255,255,255,.13);border:none;color:#fff;border-radius:50%;width:32px;height:32px;flex-shrink:0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;font-family:inherit;}
.fml-close:hover{background:rgba(255,255,255,.28);}
.fml-itabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.fml-itabs::-webkit-scrollbar{display:none;}
.fml-itab{padding:10px 16px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;}
.fml-itab:hover:not(.on){color:rgba(255,255,255,.88);}
.fml-itab.on{color:#fff;border-bottom-color:#f97316;}
.fml-bd{overflow-y:auto;padding:20px;flex:1;}
.fml-bd::-webkit-scrollbar{width:4px;}
.fml-bd::-webkit-scrollbar-thumb{background:#bfdbfe;border-radius:3px;}
.fml-panel{display:none;}
.fml-panel.on{display:block;}

/* modal content */
.fml-sec{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:7px;border-left:3px solid #1d4ed8;padding-left:9px;color:#1a2744;}
.fml-sec:first-child{margin-top:0;}
.fml-card{background:#f8fafc;border:1px solid #e4e9f0;border-radius:10px;padding:12px 13px;margin-bottom:8px;}
.fml-eq{display:block;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#1d4ed8;background:#eff6ff;border-radius:8px;padding:10px 13px;margin:6px 0;word-break:break-all;line-height:1.75;}
.fml-eq.amber{background:#fff7ed;color:#b45309;}
.fml-eq.em{background:#f0fdf4;color:#059669;}
.fml-note{font-size:10px;color:#64748b;margin-top:5px;line-height:1.8;}
.fml-hi{border:1.5px solid #bfdbfe;background:#eff6ff;border-radius:10px;padding:12px 13px;margin-bottom:8px;font-size:11px;line-height:1.8;color:#1e3a8a;}
.fml-hi.amber{border-color:#fde68a;background:#fefce8;color:#854d0e;}
.fml-hi.em{border-color:#a7f3d0;background:#f0fdf4;color:#065f46;}
.fml-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.fml-tbl{width:100%;border-collapse:collapse;font-size:11px;border-radius:8px;overflow:hidden;}
.fml-tbl th{background:#0c4da2;color:#fff;padding:7px 10px;text-align:center;font-weight:700;font-size:10px;}
.fml-tbl td{padding:7px 10px;border-bottom:1px solid #e4e9f0;}
.fml-tbl tr:last-child td{border-bottom:none;}
.fml-tbl tr:nth-child(even) td{background:#f8fafc;}
.fml-tbl td:first-child{font-weight:700;color:#1a2744;text-align:left;padding-left:12px;}
.fml-tbl td:last-child{font-weight:800;color:#1d4ed8;font-size:12px;text-align:right;}
.exp-card{border:1px solid #e4e9f0;border-radius:12px;padding:15px;margin-bottom:10px;}

/* ═══ MODAL CARD TITLE (fml-card-ttl) ═══ */
.fml-card-ttl{font-size:11px;font-weight:800;color:#1a2744;margin-bottom:5px;letter-spacing:.02em;}

.a4-top{background:linear-gradient(90deg,#0c4da2,#1d4ed8);padding:24px 42px 20px;}
.a4-bar{height:5px;background:#f97316;border-radius:2px;margin-bottom:14px;}
.a4-body{padding:26px 42px 32px;}
.a4-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:11px;padding-bottom:9px;border-bottom:2px solid #1d4ed8;}
.a4-sec-bar{width:3px;height:15px;background:#1d4ed8;border-radius:2px;}
.a4-sec-label{font-size:11px;font-weight:900;color:#1a2744;letter-spacing:.1em;text-transform:uppercase;}
.a4-cond-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.a4-cond-cell{background:#f8fafd;border:1px solid #e2e8f0;border-radius:8px;padding:11px 8px;text-align:center;}
.a4-cond-lbl{font-size:8px;color:#94a3b8;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.a4-cond-val{font-size:11px;color:#1a2744;font-weight:800;}
.a4-verdict-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.a4-vtbl{width:100%;border-collapse:collapse;font-size:11px;font-family:'JetBrains Mono',monospace;margin-bottom:18px;}
.a4-vtbl th{background:#1e293b;color:#fff;padding:8px 7px;font-size:10px;font-weight:700;letter-spacing:.07em;}
.a4-vtbl td{padding:8px 7px;border-bottom:1px solid #e2e8f0;}
.a4-vtbl tfoot td{background:#eff6ff;border-top:2px solid #1d4ed8;font-weight:900;}
.a4-u-bar{background:#1e293b;border-radius:12px;padding:14px 22px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.a4-footer{border-top:1px solid #e2e8f0;padding-top:9px;display:flex;justify-content:space-between;align-items:center;}

/* ═══ PRINT ═══ */
@page{size:A4 portrait;margin:0mm;}
@media print{
  *,*::before,*::after{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .no-print{display:none!important;}
  html,body{margin:0!important;padding:0!important;width:210mm!important;height:297mm!important;background:#fff!important;overflow:hidden!important;}
  #a4-hidden{position:relative!important;left:0!important;top:0!important;display:block!important;visibility:visible!important;margin:0!important;background:#fff!important;box-shadow:none!important;border:none!important;}
  #root>*:not(#a4-hidden){display:none!important;}
}

/* ═══ RESPONSIVE ═══ */
@media(min-width:769px){
  .mob-only{display:none!important;}
}
@media(max-width:768px){
  .two-col{grid-template-columns:1fr;}
  .desk-only{display:none!important;}
  .brand-title{font-size:13px;}
  .brand-sub{display:none;}

  .main-wrap{padding:12px 10px 90px;}
  .fml-overlay{padding:0;align-items:flex-end;}
  .fml-modal{border-radius:20px 20px 0 0;max-height:92vh;}
  .fml-g2{grid-template-columns:1fr;}
  .v3{grid-template-columns:1fr 1fr 1fr;}
}
@media(max-width:480px){
  .v3{grid-template-columns:1fr 1fr;}
  .hdr-btns .btn-mobpng{display:none;}

const MaterialTab=()=>{
  const [selCat,setSelCat]=useState('K_단열재계');
  const [openGrp,setOpenGrp]=useState({});
  const [query,setQuery]=useState('');
  const cat=DB[selCat];
  const q=query.trim().toLowerCase();
  const filteredGroups=useMemo(()=>{
    if(!cat)return{};
    if(!q)return cat.groups;
    const res={};
    Object.entries(cat.groups).forEach(([gk,g])=>{
      const mi={};Object.entries(g.items).forEach(([ik,v])=>{if(ik.toLowerCase().replace(/_/g,' ').includes(q))mi[ik]=v;});
      if(g.label.toLowerCase().includes(q)||Object.keys(mi).length>0)res[gk]={...g,items:Object.keys(mi).length>0?mi:g.items};
    });
    return res;
  },[selCat,q,cat]);
  useEffect(()=>{if(q){const o={};Object.keys(cat?.groups||{}).forEach(k=>{o[k]=true;});setOpenGrp(o);}else{setOpenGrp({});}
  },[q,selCat]);
  const toggleGrp=k=>setOpenGrp(p=>({...p,[k]:!p[k]}));

  return(
    <div className="mat-wrap">
      <div style={{display:'flex',gap:'10px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}}>
        <input style={{flex:1,minWidth:'160px',padding:'8px 11px',background:'#f8fafd',border:'1.5px solid #dde3ed',borderRadius:'8px',color:'#1a2744',fontSize:'12px',fontFamily:'inherit',outline:'none',transition:'border-color .15s'}} placeholder="🔍 재료명 검색..." value={query} onChange={e=>setQuery(e.target.value)} onFocus={e=>e.target.style.borderColor='#1d4ed8'} onBlur={e=>e.target.style.borderColor='#dde3ed'}/>
        {selCat==='K_단열재계'&&(
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
            {[{l:'가급 λ≤0.034',c:'#eff6ff',bc:'#bfdbfe',tc:'#1d4ed8'},{l:'나급 ≤0.040',c:'#f0fdf4',bc:'#a7f3d0',tc:'#059669'},{l:'다급 ≤0.046',c:'#fefce8',bc:'#fde047',tc:'#854d0e'},{l:'라급 ≤0.052',c:'#fff1f2',bc:'#fecdd3',tc:'#be123c'}].map(({l,c,bc,tc})=>(
              <span key={l} style={{background:c,border:`1px solid ${bc}`,color:tc,borderRadius:'6px',padding:'3px 8px',fontSize:'9px',fontWeight:800}}>{l}</span>
            ))}
          </div>
        )}
      </div>
      <div className="mat-cat-bar">
        {Object.entries(DB).map(([k,c])=>(
          <button key={k} className={`mat-cat-btn${selCat===k?' active':''}`} onClick={()=>{setSelCat(k);setOpenGrp({});setQuery('');}}>{c.label}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
        {Object.entries(filteredGroups).map(([gk,g])=>{
          const isOpen=!!openGrp[gk]||!!q;
          const items=Object.entries(g.items);
          return(
            <div key={gk} style={{border:'1px solid #e2e8f0',borderRadius:'10px',overflow:'hidden',background:'#fff'}}>
              <button className="mat-group-hd" onClick={()=>toggleGrp(gk)}>
                <span style={{fontSize:'11px',fontWeight:700,color:'#1a2744',flex:1,textAlign:'left'}}>{g.label}</span>
                <span style={{fontSize:'10px',color:'#94a3b8',marginRight:'8px'}}>{items.length}종</span>
                <span style={{color:'#94a3b8',fontSize:'12px',transition:'transform .2s',display:'inline-block',transform:isOpen?'rotate(180deg)':'rotate(0)'}}>▾</span>
              </button>
              {isOpen&&(
                <table className="mat-tbl">
                  <thead><tr>
                    <th style={{textAlign:'left',paddingLeft:'12px'}}>재료명 (소분류)</th>
                    <th style={{textAlign:'right',width:'110px'}}>λ (W/mK)</th>
                    {selCat==='K_단열재계'&&<th style={{textAlign:'center',width:'60px'}}>등급</th>}
                  </tr></thead>
                  <tbody>
                    {items.map(([ik,v],idx)=>(
                      <tr key={ik} style={{background:idx%2===0?'#fff':'#f8fafd'}}>
                        <td style={{paddingLeft:'12px',color:'#374151',fontWeight:500}}>{ik.replace(/_/g,' ')}</td>
                        <td style={{textAlign:'right',color:lambdaColor(v),fontWeight:800,fontFamily:'JetBrains Mono,monospace'}}>{v.toFixed(3)}</td>
                        {selCat==='K_단열재계'&&<td style={{textAlign:'center'}}>{lambdaPill(v)}</td>}
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
        {Object.keys(filteredGroups).length===0&&(
          <div style={{textAlign:'center',padding:'32px',color:'#94a3b8',fontSize:'12px'}}>검색 결과가 없습니다</div>
        )}
      </div>
    </div>
  );
};

  const cl=useMemo(()=>layers.map(l=>{

                <span style={{fontSize:'9px',color:'#94a3b8',fontStyle:'italic',marginLeft:'6px',fontWeight:600}}>실외 → 실내</span>
                <button className="btn-add" style={{marginLeft:'auto'}} onClick={()=>setLayers([...layers,{id:Date.now(),cat:"C_콘크리트계",group:"일반콘크리트",name:"철근콘크리트",t:10,lambda:1.6}])}>+ 추가</button>
              </div>
              <div className="card-body" style={{display:'flex',flexDirection:'column',gap:'9px'}}>
                {layers.map((layer,idx)=>(
                  <div key={layer.id} className="layer-card">
                    <div style={{position:'absolute',left:'-11px',top:'50%',transform:'translateY(-50%)',width:'18px',height:'18px',background:'#1d4ed8',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',fontWeight:900,color:'#fff',zIndex:1,flexShrink:0}}>{idx+1}</div>

                      <select className="fselect" value={layer.cat} onChange={e=>updateLayer(layer.id,'cat',e.target.value)}>{Object.keys(DB_H).map(c=><option key={c} value={c}>{c.replace(/_/g,' ')}</option>)}</select>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px'}}>
                        <select className="fselect" value={layer.group} onChange={e=>updateLayer(layer.id,'group',e.target.value)}>{Object.keys(DB_H[layer.cat]||{}).map(g=><option key={g} value={g}>{g.replace(/_/g,' ')}</option>)}</select>

                </div>
                {/* 수식 */}
                <div className="fml-box-lg">
                  <div style={{fontSize:'9px',fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'7px'}}>열관류율 산출식</div>

                    <span style={{color:'#38bdf8',fontWeight:700,fontSize:'16px'}}>=</span>
                    <span style={{color:'#fbbf24',fontSize:'32px',fontWeight:900,fontFamily:'JetBrains Mono,monospace',lineHeight:1}}>{currentU}</span>
                    <span style={{color:'rgba(255,255,255,.4)',fontSize:'10px',fontWeight:700}}>W/m²K</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 상세 산출표 */}
            <div className="card">
              <div className="card-head">
                <div className="card-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg></div>
                <span className="card-title">부위별 상세 산출 근거</span>
                <span className="card-badge mono" style={{fontStyle:'italic',marginLeft:'8px',fontFamily:'JetBrains Mono,monospace',fontSize:'10px'}}>U = 1 / ΣR</span>
              </div>
              <div style={{overflowX:'auto'}}>
                <table className="rtbl">
                  <colgroup><col style={{width:'7%'}}/><col style={{width:'43%'}}/><col style={{width:'14%'}}/><col style={{width:'18%'}}/><col style={{width:'18%'}}/></colgroup>
                  <thead><tr>{['NO','재료 및 사양','T(mm)','λ(W/mK)','R(m²K/W)'].map((h,i)=><th key={h} style={{textAlign:i===0?'center':i>1?'right':'left'}}>{h}</th>)}</tr></thead>
                  <tbody>
                    <tr><td style={{textAlign:'center',color:'#94a3b8',fontSize:'10px',fontStyle:'italic',fontWeight:700}}>실외</td><td style={{color:'#6b7a99',fontWeight:600}}>실외 표면열전달저항</td><td colSpan={2}></td><td style={{textAlign:'right',color:'#1d4ed8',fontWeight:800,fontFamily:'JetBrains Mono,monospace'}}>{sr.ro.toFixed(3)}</td></tr>
                    {cl.map((l,i)=>(
                      <tr key={l.id}>
                        <td style={{textAlign:'center',color:'#94a3b8',fontWeight:700,fontFamily:'JetBrains Mono,monospace'}}>{i+1}</td>
                        <td style={{fontWeight:600,color:'#1a2744',fontSize:'12px'}}>{(l.name||'').replace(/_/g,' ')}</td>
                        <td style={{textAlign:'right',color:'#b45309',fontWeight:700,fontFamily:'JetBrains Mono,monospace'}}>{l.name?.includes('공기층')?'—':(l.t||0)}</td>
                        <td style={{textAlign:'right',color:'#475569',fontWeight:600,fontFamily:'JetBrains Mono,monospace'}}>{l.name?.includes('공기층')?'—':(l.lambda||0).toFixed(3)}</td>
                        <td style={{textAlign:'right',color:'#1d4ed8',fontWeight:800,fontFamily:'JetBrains Mono,monospace'}}>{l.r.toFixed(3)}</td>
                      </tr>
                    ))}
                    <tr><td style={{textAlign:'center',color:'#94a3b8',fontSize:'10px',fontStyle:'italic',fontWeight:700}}>실내</td><td style={{color:'#6b7a99',fontWeight:600}}>실내 표면열전달저항</td><td colSpan={2}></td><td style={{textAlign:'right',color:'#1d4ed8',fontWeight:800,fontFamily:'JetBrains Mono,monospace'}}>{sr.ri.toFixed(3)}</td></tr>
                  </tbody>
                  <tfoot><tr><td colSpan={4} style={{textAlign:'right',fontWeight:800,fontSize:'10px',letterSpacing:'.08em',textTransform:'uppercase',color:'#6b7a99',fontStyle:'italic',paddingRight:'12px'}}>Total Thermal Resistance (ΣR)</td><td style={{textAlign:'right',fontWeight:900,color:'#059669',fontSize:'14px',fontFamily:'JetBrains Mono,monospace'}}>{totalR.toFixed(3)}</td></tr></tfoot>
                </table>
              </div>
              <div style={{padding:'10px 14px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid #eef1f6',opacity:.45,fontSize:'9px',fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'#6b7a99'}}>
                <span>건축물 에너지절약설계기준 · 제2025-738호</span>
                <span className="mono">MANMIN Ver-{VER}</span>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>

    {/* ═══ FAB ═══ */}
    <button className="fab-pill no-print" onClick={()=>setShowModal(true)}>
      📐 계산식 안내
    </button>

    {/* ═══ MODAL ═══ */}
    {showModal&&<FabModal onClose={()=>setShowModal(false)} onA4Print={()=>window.print()} onA4PNG={onA4PNG} onMobileJPG={onMobileJPG}/>}

    {/* ═══ HIDDEN CAPTURE AREAS ═══ */}
    <A4Report {...calcProps}/>
    <MobileCard {...calcProps}/>

    {/* ═══ PWA 배너는 DOM(#pwa-banner)에서 단일 관리 ═══ */}
    </>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js', {scope:'./'})
      .then(function(r){
        console.log('[PWA] SW:', r.scope);
        r.addEventListener('updatefound', function(){
          var nw = r.installing; if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              var b = document.createElement('div');
              b.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#1d4ed8;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(29,78,216,.5);white-space:nowrap;font-family:inherit;';
              b.innerHTML='<span>🔄 새 버전 준비됨</span>'
                +'<button onclick="navigator.serviceWorker.ready.then(function(r){if(r.waiting)r.waiting.postMessage({type:\'SKIP_WAITING\'});});this.parentNode.remove();location.reload();" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-weight:800;font-family:inherit;">지금 적용</button>'
                +'<button onclick="this.parentNode.remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;padding:0 4px;">✕</button>';
              document.body.appendChild(b);
              setTimeout(function(){if(b.parentNode)b.remove();}, 8000);
            }
          });
        });
      })
      .catch(function(e){ console.warn('[PWA] 실패:', e); });
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(!window._pwaR){ window._pwaR=true; location.reload(); }
    });
  });
}
</script>

<!-- ═══ PWA 설치 로직 ═══ -->
<script>
(function(){
  var deferred = null;
  var _isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var _isSA  = window.matchMedia('(display-mode:standalone)').matches || !!navigator.standalone;

  /* ── 1. beforeinstallprompt (Android/PC) ── */
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferred = e;
    var btn = document.getElementById('pwa-install-btn');
    if(btn) btn.classList.add('visible');
    if(!sessionStorage.getItem('pwa-dismissed') && !_isSA){
      setTimeout(function(){
        var b = document.getElementById('pwa-banner');
        if(b) b.classList.add('visible');
      }, 2000);
    }
  });

  /* ── 2. iOS: 헤더 버튼 표시 + 2초 후 안내 모달 ── */
  document.addEventListener('DOMContentLoaded', function(){
    if(_isIOS && !_isSA){
      var btn = document.getElementById('pwa-install-btn');
      if(btn) btn.classList.add('visible');
      if(!sessionStorage.getItem('pwa-dismissed')){
        setTimeout(function(){
          var m = document.getElementById('ios-modal-heat');
          if(m) m.classList.add('show');
        }, 2000);
      }
    }
    if(_isSA){
      var btn = document.getElementById('pwa-install-btn');
      if(btn) btn.style.display = 'none';
    }
  });

  /* ── 3. 설치 실행 (전역) ── */
  window.pwaTriggerInstall = function(){
    var b = document.getElementById('pwa-banner');
    if(b) b.classList.remove('visible');
    /* iOS → 안내 모달 */
    if(_isIOS && !_isSA){
      var m = document.getElementById('ios-modal-heat');
      if(m) m.classList.add('show');
      return;
    }
    var reactPrompt = window.__reactInstallPrompt;
    var prompt = reactPrompt || deferred;
    if(!prompt){
      if(_isSA){ alert('✅ 이미 앱으로 설치되어 있습니다.'); return; }
      alert('📱 브라우저 메뉴 → 앱 설치 / 홈 화면에 추가');
      return;
    }
    prompt.prompt();
    prompt.userChoice.then(function(r){
      if(r.outcome === 'accepted'){
        var btn = document.getElementById('pwa-install-btn');
        if(btn) btn.classList.remove('visible');
      }
      deferred = null;
      window.__reactInstallPrompt = null;
    });
  };

  /* ── 4. 배너 닫기 ── */
  window.pwaDismiss = function(){
    var b = document.getElementById('pwa-banner');
    if(b){
      b.style.transition='transform .3s,opacity .25s';
      b.style.transform='translateY(110%)';
      b.style.opacity='0';
      setTimeout(function(){b.classList.remove('visible');b.style='';}, 330);
    }
    try{ sessionStorage.setItem('pwa-dismissed','1'); }catch(e){}
  };

  /* ── 5. 설치 완료 ── */
  window.addEventListener('appinstalled', function(){
    var btn = document.getElementById('pwa-install-btn');
    var b   = document.getElementById('pwa-banner');
    if(btn) btn.classList.remove('visible');
    if(b)   b.classList.remove('visible');
    deferred = null;
    window.__reactInstallPrompt = null;
  });
})();
</script>
