        const App = () => {
            const [projectName, setProjectName] = useState('만민 건축사 신사옥 신축공사');

            const targetU = useMemo(() => { try { return U_STANDARDS[region]?.[part]?.[exposure]?.[usage]||0; } catch(e){return 0;} }, [region,part,exposure,usage]);
            const targetT = useMemo(() => { try { return T_STANDARDS[region]?.[part]?.[exposure]?.[usage]||[0,0,0,0]; } catch(e){return [0,0,0,0];} }, [region,part,exposure,usage]);

            const surfaceRes = useMemo(() => {
                let ri=0.11, ro=0.043;
                const direct = exposure?.includes('직접')||false;
                if (part==='거실의 외벽')             { ri=0.11;  ro=direct?0.043:0.11; }

                else if (part.includes('바닥'))       { ri=0.086; ro=(part==='바닥난방인 층간바닥')?0.086:(direct?0.043:0.15); }

                else { r=(l.lambda||0)>0?((l.t||0)/1000/l.lambda):0; }
                return {...l, r};
            }), [layers]);

            const totalR = useMemo(() =>
                (surfaceRes.ri||0)+(surfaceRes.ro||0)+calculatedLayers.reduce((a,c)=>a+(c.r||0),0),
            [surfaceRes, calculatedLayers]);

            const currentU = totalR>0 ? (Math.round((1/totalR)*1000)/1000).toFixed(3) : '0.000';
            const isPass   = parseFloat(currentU) <= targetU;

            const updateLayer = (id, field, val) => {
                setLayers(prev => prev.map(l => {
                    if (l.id !== id) return l;
                    const u = {...l, [field]: val};
                    if (field==='cat') {
                        const fg = Object.keys(DB_HIERARCHY[val]||{})[0]||'';
                        u.group  = fg;
                        const fm = Object.keys((DB_HIERARCHY[val]||{})[fg]||{})[0]||'';
                        u.name   = fm;
                        u.lambda = ((DB_HIERARCHY[val]||{})[fg]||{})[fm]||0;
                    } else if (field==='group') {
                        const fm = Object.keys((DB_HIERARCHY[l.cat]||{})[val]||{})[0]||'';
                        u.name   = fm;
                        u.lambda = ((DB_HIERARCHY[l.cat]||{})[val]||{})[fm]||0;
                    } else if (field==='name') {
                        u.lambda = ((DB_HIERARCHY[l.cat]||{})[l.group]||{})[val]||0;
                    }
                    return u;
                }));
            };

            // ════════════════════════════════════════════════════════════
            //  downloadPNG : html2canvas 한글 텍스트 처짐 최종 해결
            //
            //  실패 원인:
            //   - line-height:1 / overflow:hidden+고정height → 한글 글자 잘림
            //  최종 전략:
            //   - T(text, fs, color, extra) : line-height = fs*1.15px (한글 안전값)
            //   - overflow:hidden / 고정height 완전 금지
            //   - 간격: SP(h) spacer div 만 사용
            //   - 수직정렬: padding-top 만 사용
            // ══════════════════════════════════════════════════
            //  dom-to-image (cdnjs) 사용: 화면 DOM 직접 캡처
            //  → 오프스크린 DOM 재구성 불필요
            //  → 웹폰트/CSS/flex 모두 정확히 렌더링
            // ══════════════════════════════════════════════════

            // 클론을 body에 붙여 캡처 → 뷰포트 제약 없이 정확한 렌더링
            /*
             * ★ 참고파일(공공기관_건축사_업무대가_산출기_v1_4) 검증된 캡처 방식 그대로 적용
             *  1. document.fonts.ready + 150ms 대기 → 폰트 완전 로드 보장
             *  2. transform:scale() 트릭 → dom-to-image scale 옵션 오작동 우회
             *  3. A4 오프스크린 요소: 캡처 전 visibility:visible 처리
             */
            const captureToPng = async (nodeId, filename, bg) => {
                const lib = window.domtoimage;
                if (!lib) { alert('dom-to-image 로드 실패. 인터넷 연결을 확인해 주세요.'); return; }

                const node = document.getElementById(nodeId);
                if (!node) { alert(nodeId + ' 요소를 찾을 수 없습니다.'); return; }

                // 오프스크린 요소(A4): position/left를 임시로 화면 내로 이동
                const origPosition = node.style.position;
                const origLeft     = node.style.left;
                const origTop      = node.style.top;
                const origZIndex   = node.style.zIndex;
                const isOffscreen  = origLeft === '-9999px';

                if (isOffscreen) {
                    node.style.position = 'fixed';
                    node.style.left     = '0px';
                    node.style.top      = '0px';
                    node.style.zIndex   = '-9999'; // 화면 뒤로
                }

                try {
                    // ① 폰트 완전 로드 대기
                    await document.fonts.ready;
                    // ② 레이아웃 재계산 + 렌더링 안정화 대기
                    await new Promise(r => setTimeout(r, 200));

                    const scale = 3;
                    const w = node.offsetWidth;
                    const h = node.offsetHeight;

                    if (!w || !h) throw new Error(`요소 크기 오류: ${nodeId} (${w}x${h})`);

                    // ③ transform:scale 트릭 (참고파일 핵심 패턴)
                    const dataUrl = await lib.toPng(node, {
                        width:  w * scale,
                        height: h * scale,
                        style: {
                            transform:       `scale(${scale})`,
                            transformOrigin: 'top left',
                            width:           w + 'px',
                            height:          h + 'px',
                        },
                    });

                    const link = document.createElement('a');
                    link.href     = dataUrl;
                    link.download = filename + '_' + Date.now() + '.png';
                    link.click();

                } catch (err) {
                    console.error('이미지 저장 실패:', err);
                    alert('저장 중 오류가 발생했습니다.\n' + err);
                } finally {
                    // 원복
                    if (isOffscreen) {
                        node.style.position = origPosition;
                        node.style.left     = origLeft;
                        node.style.top      = origTop;
                        node.style.zIndex   = origZIndex;
                    }
                }
            };

            const downloadPNG   = () => captureToPng('report-area',    '열관류율_검토서',    '#0F172A');
            const downloadA4PNG = () => captureToPng('a4-capture-area', '열관류율_검토서_A4', '#FFFFFF');

            // ═══════════════════════════════════════════════
            //  PWA 설치 프롬프트
            // ═══════════════════════════════════════════════
            const [installPrompt, setInstallPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);

            useEffect(() => {
                const handler = (e) => {
                    e.preventDefault();
                    setInstallPrompt(e);
                    // 이미 설치되어 있으면 배너 안 보여줌
                    if (!window.matchMedia('(display-mode: standalone)').matches) {
                        setShowInstallBanner(true);
                    }
                };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const result = await installPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    console.log('[PWA] 설치 완료');
                }
                setInstallPrompt(null);
                setShowInstallBanner(false);
            };

            // ═══════════════════════════════════════════════
            //  A4 인쇄 자동 스케일링 (beforeprint / afterprint)
            // ═══════════════════════════════════════════════
            useEffect(() => {
                const handleBeforePrint = () => {
                    const node = document.getElementById('a4-capture-area');
                    if (!node) return;
                    const A4_W = 794, A4_H = 1123;
                    node.dataset.origStyle = node.getAttribute('style') || '';
                    node.style.position = 'absolute';
                    node.style.left = '0px'; node.style.top = '0px';
                    node.style.width = A4_W + 'px';
                    node.style.zIndex = '-99999'; node.style.visibility = 'hidden';
                    node.style.transform = 'none';
                    void node.offsetHeight;
                    const contentH = node.scrollHeight;
                    const scale = Math.min(1, A4_H / contentH);
                    node.style.position = 'relative';
                    node.style.left = '0'; node.style.top = '0';
                    node.style.visibility = 'visible'; node.style.zIndex = '1';
                    node.style.backgroundColor = '#FFFFFF';
                    node.style.overflow = 'hidden';
                    if (scale < 1) {
                        node.style.width = (A4_W / scale) + 'px';
                        node.style.transform = `scale(${scale})`;
                        node.style.transformOrigin = 'top left';
                    } else {
                        node.style.width = A4_W + 'px';
                        node.style.transform = 'none';
                    }
                };
                const handleAfterPrint = () => {
                    const node = document.getElementById('a4-capture-area');
                    if (!node) return;
                    const orig = node.dataset.origStyle;
                    if (orig !== undefined) {
                        node.setAttribute('style', orig);
                        delete node.dataset.origStyle;
                    }
                };
                window.addEventListener('beforeprint', handleBeforePrint);

                }}>
                    {/* 헤더 바 */}
                    <div style={{background:'linear-gradient(90deg,#1D4ED8 0%,#312E81 100%)',padding:'28px 48px 24px'}}>
                        <div style={{color:'#93C5FD',fontSize:'10px',fontWeight:900,letterSpacing:'0.25em',textTransform:'uppercase',marginBottom:'8px'}}>
                            Heat Transfer Coefficient Report · 국토교통부 제2025-738호 적용
                        </div>
                        <div style={{color:'#FFFFFF',fontSize:'28px',fontWeight:900,marginBottom:'6px'}}>
                            {projectName}
                        </div>
                        <div style={{color:'#BFDBFE',fontSize:'10px',fontWeight:700}}>
                            Developed MANMIN Ver-{SYSTEM_VERSION}
                        </div>
                    </div>

                    <div style={{padding:'32px 48px 40px'}}>
                        {/* 1. 검토 조건 */}
                        <div style={{marginBottom:'28px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'nowrap',marginBottom:'14px',paddingBottom:'10px',borderBottom:'2px solid #1D4ED8'}}>
                                <div style={{width:'4px',height:'20px',background:'#1D4ED8',borderRadius:'2px',flexShrink:0}}></div>
                                <span style={{fontSize:'13px',fontWeight:900,color:'#1E293B',letterSpacing:'0.12em',textTransform:'uppercase',whiteSpace:'nowrap'}}>1. 열관류율 검토 조건</span>
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px'}}>
                                {[{l:'대상지역',v:region},{l:'건축부위',v:part},{l:'외기조건',v:exposure},{l:'세부용도',v:usage}].map(x=>(
                                    <div key={x.l} style={{background:'#F1F5F9',border:'1px solid #CBD5E1',borderRadius:'10px',padding:'14px 10px',textAlign:'center'}}>
                                        <div style={{fontSize:'8px',color:'#64748B',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'8px'}}>{x.l}</div>
                                        <div style={{fontSize:'12px',color:'#1E293B',fontWeight:900}}>{x.v}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 2. 판정 */}
                        <div style={{marginBottom:'28px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'nowrap',marginBottom:'14px',paddingBottom:'10px',borderBottom:'2px solid #1D4ED8'}}>
                                <div style={{width:'4px',height:'20px',background:'#1D4ED8',borderRadius:'2px',flexShrink:0}}></div>
                                <span style={{fontSize:'13px',fontWeight:900,color:'#1E293B',letterSpacing:'0.12em',textTransform:'uppercase',whiteSpace:'nowrap'}}>2. 단열조치 적합여부 최종 판정</span>
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
                                <div style={{background:'#F8FAFC',border:'2px solid #CBD5E1',borderRadius:'12px',padding:'18px',textAlign:'center'}}>
                                    <div style={{fontSize:'9px',color:'#64748B',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'10px'}}>법적 기준 (W/㎡K 이하)</div>
                                    <div style={{fontSize:'30px',fontWeight:900,color:'#1E293B',fontFamily:'monospace'}}>{targetU?targetU.toFixed(3):'-'}</div>
                                </div>
                                <div style={{background:'#FEF9C3',border:'2px solid #FDE047',borderRadius:'12px',padding:'18px',textAlign:'center'}}>
                                    <div style={{fontSize:'9px',color:'#92400E',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'10px'}}>설계 산출값 (U)</div>
                                    <div style={{fontSize:'30px',fontWeight:900,color:'#92400E',fontFamily:'monospace'}}>{currentU}</div>
                                </div>
                                <div style={{background:isPass?'#DCFCE7':'#FEE2E2',border:`2px solid ${isPass?'#16A34A':'#DC2626'}`,borderRadius:'12px',padding:'18px',textAlign:'center'}}>
                                    <div style={{fontSize:'9px',color:isPass?'#14532D':'#7F1D1D',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'10px'}}>STATUS · 국토교통부고시 제6조</div>
                                    <div style={{fontSize:'28px',fontWeight:900,letterSpacing:'0.2em',color:isPass?'#15803D':'#DC2626',fontFamily:'monospace'}}>{isPass?'적  합':'부적합'}</div>
                                </div>
                            </div>
                        </div>

                        {/* 3. 산출 근거 */}
                        <div style={{marginBottom:'24px'}}>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'nowrap',marginBottom:'14px',paddingBottom:'10px',borderBottom:'2px solid #1D4ED8'}}>
                                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                    <div style={{width:'4px',height:'20px',background:'#1D4ED8',borderRadius:'2px',flexShrink:0}}></div>
                                    <span style={{fontSize:'13px',fontWeight:900,color:'#1E293B',letterSpacing:'0.12em',textTransform:'uppercase',whiteSpace:'nowrap'}}>3. 부위별 상세 산출 근거</span>
                                </div>
                                <span style={{fontSize:'11px',color:'#94A3B8',fontStyle:'italic',fontWeight:700}}>U = 1 / ΣR</span>
                            </div>
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px',fontFamily:'monospace'}}>
                                <colgroup>
                                    <col style={{width:'7%'}}/><col style={{width:'48%'}}/><col style={{width:'13%'}}/><col style={{width:'16%'}}/><col style={{width:'16%'}}/>
                                </colgroup>
                                <thead>
                                    <tr style={{background:'#1E293B',color:'#FFFFFF'}}>
                                        {['NO','재료 및 사양','T(mm)','λ','Res.(R)'].map((h,i)=>(
                                            <th key={h} style={{padding:'10px 8px',textAlign:i===0?'center':i>1?'right':'left',fontWeight:900,fontSize:'10px',letterSpacing:'0.1em'}}>{h}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr style={{background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>
                                        <td style={{padding:'10px 8px',textAlign:'center',color:'#94A3B8',fontStyle:'italic',fontWeight:700,fontSize:'11px'}}>실외</td>
                                        <td colSpan="3" style={{padding:'10px 8px',color:'#475569',fontWeight:600}}>실외 표면열전달저항</td>
                                        <td style={{padding:'10px 8px',textAlign:'right',color:'#1D4ED8',fontWeight:900}}>{surfaceRes.ro.toFixed(3)}</td>
                                    </tr>
                                    {calculatedLayers.map((l,i)=>(
                                        <tr key={l.id} style={{background:i%2===0?'#FFFFFF':'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>
                                            <td style={{padding:'10px 8px',textAlign:'center',color:'#94A3B8',fontWeight:700}}>{i+1}</td>
                                            <td style={{padding:'10px 8px',fontWeight:700,color:'#1E293B'}}>{l.name?.replace(/_/g,' ')}</td>
                                            <td style={{padding:'10px 8px',textAlign:'right',color:'#B45309',fontWeight:900}}>{l.name?.includes('공기층')?'-':(l.t||0).toString().substring(0,3)}</td>
                                            <td style={{padding:'10px 8px',textAlign:'right',color:'#475569',fontWeight:600,opacity:0.8}}>{l.name?.includes('공기층')?'-':(l.lambda||0).toFixed(3)}</td>
                                            <td style={{padding:'10px 8px',textAlign:'right',color:'#1D4ED8',fontWeight:900}}>{l.r.toFixed(3)}</td>
                                        </tr>
                                    ))}
                                    <tr style={{background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>
                                        <td style={{padding:'10px 8px',textAlign:'center',color:'#94A3B8',fontStyle:'italic',fontWeight:700,fontSize:'11px'}}>실내</td>
                                        <td colSpan="3" style={{padding:'10px 8px',color:'#475569',fontWeight:600}}>실내 표면열전달저항</td>
                                        <td style={{padding:'10px 8px',textAlign:'right',color:'#1D4ED8',fontWeight:900}}>{surfaceRes.ri.toFixed(3)}</td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr style={{background:'#EFF6FF',borderTop:'2px solid #1D4ED8'}}>
                                        <td colSpan="4" style={{padding:'12px 8px',textAlign:'right',fontWeight:900,fontSize:'11px',color:'#1E293B',letterSpacing:'0.1em',textTransform:'uppercase',fontStyle:'italic'}}>Total Thermal Resistance (ΣR)</td>
                                        <td style={{padding:'12px 8px',textAlign:'right',fontWeight:900,color:'#059669',fontSize:'14px'}}>{totalR.toFixed(3)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        {/* U값 결과 */}
                        <div style={{background:'#1E293B',borderRadius:'14px',padding:'20px 28px',display:'flex',alignItems:'center',justifyContent:'center',gap:'14px',flexWrap:'nowrap',marginBottom:'24px'}}>
                            <span style={{color:'#64748B',fontSize:'14px',fontWeight:700,fontFamily:'monospace',fontStyle:'italic',whiteSpace:'nowrap'}}>U = 1 / {totalR.toFixed(3)}</span>
                            <span style={{color:'#3B82F6',fontWeight:900,fontSize:'20px',whiteSpace:'nowrap'}}>=</span>
                            <span style={{color:'#FACC15',fontWeight:900,fontSize:'34px',fontFamily:'monospace',letterSpacing:'-0.02em',whiteSpace:'nowrap'}}>{currentU}</span>
                            <span style={{color:'#94A3B8',fontSize:'13px',fontWeight:700,letterSpacing:'0.1em',whiteSpace:'nowrap'}}>W/㎡K</span>
                        </div>

                        {/* 하단 서명 */}
                        <div style={{borderTop:'1px solid #E2E8F0',paddingTop:'12px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'nowrap'}}>
                            <span style={{fontSize:'9px',color:'#94A3B8',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',whiteSpace:'nowrap'}}>건축물 에너지절약설계기준 · 국토교통부고시 제2025-738호</span>
                            <span style={{fontSize:'9px',color:'#CBD5E1',fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',whiteSpace:'nowrap'}}>DEVELOPED MANMIN VER-{SYSTEM_VERSION}</span>
                        </div>
                    </div>
                </div>

                {/* ═══ PWA 설치 배너 ═══ */}
                {showInstallBanner && (
                    <div className="fixed bottom-20 left-4 right-4 lg:left-auto lg:right-6 lg:bottom-24 lg:w-[380px] z-[60] pwa-install-banner rounded-2xl p-4 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <img src="icons/icon-192.png" className="w-12 h-12 rounded-xl shadow-lg flex-shrink-0" alt="앱 아이콘" />
                            <div className="flex-1 min-w-0">
                                <p className="text-white text-[13px] font-black leading-tight">홈 화면에 설치하시겠습니까?</p>
                                <p className="text-blue-200 text-[10px] mt-1 font-bold opacity-80">오프라인에서도 사용 가능한 앱으로 설치됩니다</p>
                            </div>
                            <div className="flex gap-2 flex-shrink-0">
                                <button onClick={()=>setShowInstallBanner(false)}
                                    className="text-white/60 hover:text-white text-[11px] font-bold px-3 py-2 rounded-lg transition-colors">
                                    닫기
                                </button>
                                <button onClick={handleInstall}
                                    className="bg-white text-blue-700 text-[11px] font-black px-4 py-2 rounded-lg shadow-md hover:bg-blue-50 active:scale-95 transition-all">
                                    설치
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- ═══ Service Worker 등록 ═══ -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] SW 등록 완료 — scope:', reg.scope))
                    .catch(err => console.warn('[PWA] SW 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
