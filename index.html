<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>열관류율 종합 검토 시스템 [MANMIN-Ver3.1] | 만민 건축사사무소</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1d4ed8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="열관류율"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="icon" type="image/x-icon" href="./favicon.ico"/>
<meta name="description" content="건축물 에너지절약설계기준 국토교통부고시 제2025-738호 기반 열관류율 자동 산출 시스템"/>
<meta property="og:title" content="열관류율 종합 검토 시스템 MANMIN-Ver3.1"/>
<meta property="og:description" content="반응형 PWA · 데스크탑·태블릿·모바일 완벽 지원"/>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

<style>
/* ════════════════════════════════════════
   MANMIN-Ver3.1  |  디자인 시스템 토큰
════════════════════════════════════════ */
:root{
  --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;
  --blue-400:#60a5fa;--blue-600:#2563eb;--blue-700:#1d4ed8;
  --blue-800:#1e40af;--blue-900:#1e3a8a;
  --navy:#1a2744;
  --orange:#f97316;--orange-d:#ea580c;
  --green:#059669;--green-l:#f0fdf4;
  --red:#e11d48;--red-l:#fff1f2;
  --bg:#f0f4f9;
  --card:#fff;
  --border:#e2e8f0;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(29,78,216,.12);
  --shadow-lg:0 8px 32px rgba(29,78,216,.18);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --mono:'JetBrains Mono','Courier New',monospace;
  --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}

/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--navy);min-height:100vh;}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type="number"]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--blue-200);border-radius:10px;}
.mono{font-family:var(--mono)!important;}

/* ═══ HEADER ═══ */
.app-header{
  background:var(--blue-100);
  position:sticky;top:0;z-index:40;
  box-shadow:0 2px 16px rgba(147,197,253,.45);
}
.header-inner{
  max-width:1280px;margin:0 auto;
  padding:0 20px;height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand-logo{display:flex;align-items:center;gap:12px;min-width:0;flex:1;}
.brand-icon{
  width:40px;height:40px;background:var(--blue-700);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(29,78,216,.38);flex-shrink:0;
}
.brand-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brand-texts{min-width:0;}
.brand-title{font-size:15px;font-weight:900;color:var(--blue-900);letter-spacing:-.02em;line-height:1.25;white-space:nowrap;}
.brand-sub{font-size:10px;color:var(--blue-600);margin-top:1px;white-space:nowrap;font-weight:600;}
.hdr-btns{display:flex;gap:8px;flex-shrink:0;}
.btn-print{
  background:#e63312;color:#fff;border:none;
  padding:9px 14px;border-radius:9px;font-size:12px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  font-family:inherit;transition:all .15s;
  box-shadow:0 2px 10px rgba(230,51,18,.35);white-space:nowrap;
}
.btn-print:hover{background:#c62a0c;}
.btn-print:active{transform:scale(.97);}
.btn-print svg,.btn-blue svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-blue{
  background:var(--blue-700);color:#fff;border:none;
  padding:9px 14px;border-radius:9px;font-size:12px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  font-family:inherit;transition:all .15s;
  box-shadow:0 2px 10px rgba(29,78,216,.3);white-space:nowrap;
}
.btn-blue:hover{background:var(--blue-800);}
.btn-blue:active{transform:scale(.97);}

/* PWA 설치 버튼 */
#pwa-install-btn{
  display:none;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--orange),var(--blue-700));
  color:#fff;border:none;padding:9px 13px;border-radius:9px;
  font-size:12px;font-weight:800;cursor:pointer;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
  transition:all .2s;
  animation:pwa-glow 2.5s ease-in-out infinite;
}
#pwa-install-btn.visible{display:flex;}
#pwa-install-btn:hover{transform:translateY(-1px);}
@keyframes pwa-glow{
  0%,100%{box-shadow:0 2px 12px rgba(249,115,22,.4);}
  50%{box-shadow:0 2px 22px rgba(249,115,22,.7);}
}
@media(max-width:520px){
  #pwa-install-btn .pwa-txt{display:none;}
  #pwa-install-btn{padding:9px 10px;}
}

/* ═══ MAIN LAYOUT ═══ */
.app-main{max-width:1280px;margin:0 auto;padding:20px 16px 100px;}

/* 버전 배지 */
.ver-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--blue-900),var(--blue-700));
  color:#fff;border-radius:999px;
  padding:5px 14px 5px 8px;
  font-size:11px;font-weight:800;
  letter-spacing:.04em;
  box-shadow:var(--shadow-md);
  margin-bottom:16px;
}
.ver-dot{width:8px;height:8px;border-radius:50%;background:#34d399;animation:pulse-green 2s ease-in-out infinite;}
@keyframes pulse-green{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ═══ INFO CARDS — 상단 3열 ═══ */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:768px){.info-grid{grid-template-columns:1fr;}}
@media(min-width:480px) and (max-width:768px){.info-grid{grid-template-columns:repeat(2,1fr);}}
.info-card{
  background:var(--card);border-radius:var(--r-md);
  border:1px solid var(--border);
  padding:16px 18px;
  box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:14px;
  transition:box-shadow .2s,transform .2s;
}
.info-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.info-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.info-card-body{}
.info-card-label{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.info-card-value{font-size:14px;font-weight:900;color:var(--navy);}

/* ═══ 2 COLUMN LAYOUT ═══ */
.two-col{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start;}
@media(max-width:960px){.two-col{grid-template-columns:1fr;}}

/* ═══ PANEL CARD ═══ */
.panel{
  background:var(--card);border-radius:var(--r-lg);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}
.panel-hd{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.panel-hd-icon{
  width:30px;height:30px;border-radius:8px;
  background:var(--blue-700);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.panel-hd-title{font-size:13px;font-weight:900;color:var(--blue-900);}
.panel-hd-sub{font-size:10px;color:#94a3b8;font-weight:600;margin-top:1px;}
.panel-bd{padding:16px 18px;}

/* ═══ FORM CONTROLS ═══ */
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:800;color:#475569;letter-spacing:.04em;margin-bottom:5px;display:block;}
.form-label span{color:var(--blue-600);font-weight:600;margin-left:4px;}
select,input[type="text"],input[type="number"]{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;font-family:inherit;color:var(--navy);
  background:#fff;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
select:focus,input:focus{
  border-color:var(--blue-600);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
input[type="text"]::placeholder{color:#cbd5e1;}

/* ═══ 법정 기준 배지 ═══ */
.limit-badge{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--blue-50),#e8f0fe);
  border:1.5px solid var(--blue-200);border-radius:var(--r-md);
  padding:12px 16px;margin-bottom:16px;
}
.limit-badge-label{font-size:10px;font-weight:700;color:var(--blue-900);letter-spacing:.06em;text-transform:uppercase;}
.limit-badge-value{font-size:24px;font-weight:900;color:var(--blue-700);font-family:var(--mono);}
.limit-badge-unit{font-size:10px;color:#94a3b8;font-weight:600;margin-top:2px;}

/* ═══ 표면저항 토글 ═══ */
.sr-toggle{display:flex;gap:8px;margin-bottom:14px;}
.sr-btn{
  flex:1;padding:8px 6px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:#f8fafc;
  font-size:11px;font-weight:700;color:#64748b;
  cursor:pointer;font-family:inherit;transition:all .15s;
  text-align:center;line-height:1.4;
}
.sr-btn.on{
  background:var(--blue-50);border-color:var(--blue-600);
  color:var(--blue-700);
}

/* ═══ 레이어 리스트 ═══ */
.layer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.layer-item{
  background:#f8fafc;border:1.5px solid var(--border);
  border-radius:var(--r-md);padding:10px 12px;
  display:grid;grid-template-columns:1fr auto auto auto auto;
  gap:8px;align-items:center;
}
.layer-item:hover{border-color:var(--blue-200);}
.layer-name{font-size:12px;font-weight:700;color:var(--navy);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.layer-val{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue-700);white-space:nowrap;}
.layer-r{font-family:var(--mono);font-size:12px;font-weight:900;color:var(--green);}
.layer-del{
  width:24px;height:24px;border-radius:6px;
  background:#fee2e2;border:none;color:var(--red);
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.layer-del:hover{background:#fecaca;}

/* ═══ 레이어 추가 폼 ═══ */
.add-layer-form{
  background:var(--blue-50);border:1.5px dashed var(--blue-200);
  border-radius:var(--r-md);padding:14px;margin-bottom:10px;
}
.add-layer-grid{display:grid;grid-template-columns:1fr 80px 80px auto;gap:8px;align-items:end;}
@media(max-width:480px){.add-layer-grid{grid-template-columns:1fr 1fr;}}

/* ═══ 결과 카드 ═══ */
.result-panel{
  background:linear-gradient(135deg,#081e44 0%,#0c4da2 60%,#1d4ed8 100%);
  border-radius:var(--r-lg);padding:20px;
  color:#fff;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(29,78,216,.35);
  position:relative;overflow:hidden;
}
.result-panel::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.result-panel-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:18px;
}
.result-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.result-u{font-size:48px;font-weight:900;font-family:var(--mono);line-height:1;color:#fff;}
.result-u-unit{font-size:13px;color:rgba(255,255,255,.6);font-weight:600;margin-top:4px;}
.verdict{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:999px;
  font-size:14px;font-weight:900;letter-spacing:.06em;
  margin-top:6px;
}
.verdict.pass{background:rgba(16,185,129,.2);border:1.5px solid rgba(52,211,153,.4);color:#34d399;}
.verdict.fail{background:rgba(225,29,72,.2);border:1.5px solid rgba(251,113,133,.4);color:#fb7185;}
.result-formula{
  background:rgba(0,0,0,.25);border-radius:var(--r-sm);
  padding:12px 14px;text-align:center;
  font-family:var(--mono);
}
.result-formula-eq{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px;}
.result-formula-val{font-size:20px;font-weight:900;color:#fbbf24;}

/* 재료 테이블 */
.layer-table{width:100%;border-collapse:collapse;font-size:12px;}
.layer-table th{
  padding:9px 10px;
  background:var(--blue-100);
  color:var(--blue-900);font-weight:800;font-size:10px;
  letter-spacing:.05em;text-transform:uppercase;
  border-bottom:2px solid var(--blue-200);
}
.layer-table th:first-child{text-align:center;}
.layer-table th:not(:first-child):not(:nth-child(2)){text-align:right;}
.layer-table td{padding:10px 10px;border-bottom:1px solid #f0f4f9;vertical-align:middle;}
.layer-table td:first-child{text-align:center;color:#94a3b8;font-weight:700;font-size:11px;}
.layer-table td:not(:first-child):not(:nth-child(2)){text-align:right;font-family:var(--mono);}
.layer-table tbody tr:hover{background:var(--blue-50);}
.layer-table tfoot tr{background:var(--blue-50);border-top:2px solid var(--blue-200);}
.layer-table tfoot td{font-weight:900;color:var(--green);font-size:15px;font-family:var(--mono);}

/* ═══ VERDICT GRID ═══ */
.verdict-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:480px){.verdict-grid{grid-template-columns:1fr 1fr;}}
.vcard{
  background:#f8fafc;border:1.5px solid var(--border);
  border-radius:var(--r-md);padding:14px 10px;text-align:center;
}
.vcard-label{font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.vcard-val{font-size:22px;font-weight:900;font-family:var(--mono);color:var(--navy);}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--r-md);padding:4px;margin-bottom:16px;border:1px solid var(--border);}
.tab-btn{
  flex:1;padding:9px 8px;border-radius:var(--r-sm);
  border:none;background:transparent;
  font-size:11px;font-weight:700;color:#64748b;
  cursor:pointer;font-family:inherit;transition:all .15s;
  white-space:nowrap;
}
.tab-btn.on{background:#fff;color:var(--blue-700);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.tab-content{display:none;}
.tab-content.on{display:block;}

/* ═══ 단열재 등급 칩 ═══ */
.ga-pill,.gb-pill,.gc-pill,.gd-pill{
  display:inline-block;font-size:10px;font-weight:800;
  padding:1px 7px;border-radius:999px;font-family:var(--mono);
}
.ga-pill{background:#dbeafe;color:var(--blue-700);}
.gb-pill{background:#d1fae5;color:#065f46;}
.gc-pill{background:#fef3c7;color:#92400e;}
.gd-pill{background:#ffe4e6;color:#9f1239;}

/* ═══ 버튼 유틸 ═══ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;border-radius:var(--r-sm);
  font-size:12px;font-weight:800;font-family:inherit;
  cursor:pointer;border:none;transition:all .15s;
}
.btn-primary{background:var(--blue-700);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.3);}
.btn-primary:hover{background:var(--blue-800);}
.btn-primary:active{transform:scale(.97);}
.btn-danger{background:#e63312;color:#fff;box-shadow:0 2px 8px rgba(230,51,18,.3);}
.btn-danger:hover{background:#c62a0c;}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#047857;}
.btn-ghost{background:var(--bg);color:var(--navy);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--blue-200);background:var(--blue-50);}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-full{width:100%;justify-content:center;}

/* ═══ RTS 전송 버튼 ═══ */
.btn-rts{
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;border:none;padding:9px 14px;border-radius:9px;
  font-size:12px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;gap:6px;font-family:inherit;
  transition:all .15s;box-shadow:0 2px 10px rgba(124,58,237,.3);
  white-space:nowrap;
}
.btn-rts:hover{background:linear-gradient(135deg,#6d28d9,#4c1d95);transform:translateY(-1px);}

/* ═══ RTS 연동 링크 배너 ═══ */
.rts-link-bar{
  background:linear-gradient(135deg,#4c1d95,#7c3aed);
  padding:7px 20px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-size:11px;font-weight:700;color:rgba(255,255,255,.8);
  letter-spacing:.02em;flex-wrap:wrap;
}
.rts-link-btn{
  color:#c4b5fd;text-decoration:none;font-weight:900;
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.13);
  padding:4px 12px;border-radius:999px;
  border:1px solid rgba(196,181,253,.4);
  transition:all .15s;white-space:nowrap;font-size:11px;font-family:inherit;cursor:pointer;
}
.rts-link-btn:hover{background:rgba(255,255,255,.24);color:#fff;border-color:rgba(196,181,253,.7);}
.rts-link-bar .dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:pulse-green 2s ease-in-out infinite;flex-shrink:0;}
@media(max-width:520px){.rts-link-bar{padding:6px 12px;gap:8px;}.rts-link-bar span.hide-sm{display:none;}}

/* ═══ FAB ═══ */
.fab-pill{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:linear-gradient(135deg,var(--blue-700),#0c4da2);
  color:#fff;border:none;
  padding:13px 20px;border-radius:999px;
  font-size:13px;font-weight:800;font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(29,78,216,.45);
  transition:all .2s;display:flex;align-items:center;gap:8px;
  animation:fab-bounce 3s ease-in-out infinite;
}
.fab-pill:hover{transform:translateY(-3px);box-shadow:0 6px 28px rgba(29,78,216,.55);}
@keyframes fab-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@media(max-width:480px){.fab-pill{bottom:16px;right:16px;padding:11px 16px;font-size:12px;}}

/* ═══ 우측 하단 도움말 모달 ═══ */
.help-modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,20,50,.55);backdrop-filter:blur(4px);
}
.help-modal-overlay.open{display:flex;align-items:flex-end;justify-content:flex-end;padding:0;}
.help-modal{
  position:fixed;bottom:80px;right:24px;z-index:201;

}
.step-card.s1{border-left:4px solid #0c4da2;}
.step-card.s2{border-left:4px solid var(--orange);background:#fff7ed;border-color:#fed7aa;}

.step-card.s4{border-left:4px solid #7c3aed;background:#f5f3ff;border-color:#ddd6fe;}

  background:linear-gradient(135deg,var(--blue-900),var(--blue-700));

function getSR(part,exposure){
  const isDirect=exposure.includes('직접');
  const isRoof=part.includes('지붕')||part.includes('반자');
  const isFloor=part.includes('바닥')||part.includes('층간');
  const ro=isDirect?0.043:0.086;
  const ri=isRoof?0.086:isFloor?0.150:0.110;
  return{ro,ri};
}

function getTargetU(region,part,exposure,usage){
  try{
    const t=UVAL_TBL[region][part][exposure][usage];
    if(!t)return null;
    return Math.min(...t);
  }catch{return null;}
}

/* ══════════════════════════════════════════
   AUTOCOMPLETE COMPONENT
══════════════════════════════════════════ */
function AutoInput({value,onChange,onSelect,placeholder}){
  const[show,setShow]=useState(false);
  const[results,setResults]=useState([]);
  const ref=useRef();

  useEffect(()=>{
    const q=value.trim().toLowerCase();
    if(!q){setResults([]);return;}
    const r=Object.entries(DB_FLAT).filter(([n])=>n.toLowerCase().includes(q)).slice(0,12);
    setResults(r);
  },[value]);

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setShow(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  return(
    <div className="autocomplete-wrapper" ref={ref}>
      <input type="text" value={value}
        onChange={e=>{onChange(e.target.value);setShow(true);}}
        onFocus={()=>setShow(true)}
        placeholder={placeholder||'재료명 검색...'}
        style={{width:'100%',padding:'9px 12px',border:'1.5px solid #e2e8f0',borderRadius:'8px',fontSize:'13px',fontFamily:'inherit',outline:'none'}}
      />
      {show&&results.length>0&&(
        <div className="autocomplete-dropdown">
          {results.map(([name,d])=>(
            <div key={name} className="autocomplete-item"
              onMouseDown={e=>{e.preventDefault();onSelect(name,d.lambda);setShow(false);}}>
              <div>
                <div className="ac-name">{name}</div>
                <div className="ac-cat">{d.cat}</div>
              </div>
              <div className="ac-lambda" style={{color:lambdaColor(d.lambda)}}>
                λ {d.lambda.toFixed(3)} <span style={{fontSize:'9px',opacity:.7}}>W/mK</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const[projectName,setProjectName]=useState('만민 건축사사무소 신사옥 신축공사 설계용역');
  const[designerName,setDesignerName]=useState('김만민');
  const[region,setRegion]=useState('중부2지역');
  const[part,setPart]=useState('거실의 외벽');
  const[exposure,setExposure]=useState('외기에 직접 면하는 경우');
  const[usage,setUsage]=useState('공동주택');
  const[directExp,setDirectExp]=useState(true);
  const[layers,setLayers]=useState([]);
  const[showAdd,setShowAdd]=useState(false);
  const[addName,setAddName]=useState('');
  const[addLambda,setAddLambda]=useState('');
  const[addThick,setAddThick]=useState('');
  const[showModal,setShowModal]=useState(false);
  const[tab,setTab]=useState('input');

  /* 연동 변경 */
  useEffect(()=>{
    const exps=EXPOSURE_MAP[part]||[];
    if(!exps.includes(exposure))setExposure(exps[0]||'해당없음');
  },[part]);
  useEffect(()=>{
    const us=USAGES_MAP[part]||[];
    if(!us.includes(usage))setUsage(us[0]||'해당없음');
  },[part]);

  /* 표면저항 */
  const sr=useMemo(()=>getSR(part,exposure),[part,exposure]);

  /* 목표 U */
  const targetU=useMemo(()=>getTargetU(region,part,exposure,usage),[region,part,exposure,usage]);

  /* 레이어 계산 */
  const calcLayers=useMemo(()=>layers.map(l=>{
    const isAir=(l.name||'').includes('공기층');
    let r;
    if(isAir){r=Math.min(0.086,(l.t||50)/1000/(l.lambda||0.117));}
    else{r=(l.t&&l.lambda)?((l.t/1000)/l.lambda):0;}
    return{...l,r};
  }),[layers]);

  const totalR=useMemo(()=>sr.ro+calcLayers.reduce((s,l)=>s+l.r,0)+sr.ri,[sr,calcLayers]);
  const currentU=useMemo(()=>totalR>0?parseFloat((1/totalR).toFixed(3)):0,[totalR]);
  const isPass=useMemo(()=>targetU?currentU<=targetU:false,[currentU,targetU]);

  /* 레이어 추가 */
  function addLayer(){
    if(!addName||!addLambda||!addThick)return;
    setLayers(p=>[...p,{id:newId(),name:addName,lambda:parseFloat(addLambda),t:parseFloat(addThick)}]);
    setAddName('');setAddLambda('');setAddThick('');setShowAdd(false);
  }
  function removeLayer(id){setLayers(p=>p.filter(l=>l.id!==id));}
  function moveLayer(i,dir){
    setLayers(p=>{const a=[...p];const ni=i+dir;if(ni<0||ni>=a.length)return a;[a[i],a[ni]]=[a[ni],a[i]];return a;});
  }

  /* RTS 전송 */
  window.triggerRTS=()=>{
    const data={projectName,designerName,region,part,exposure,usage,sr,cl:calcLayers,totalR,currentU,targetU,isPass,layers:calcLayers};
    try{
      let list=[];
      try{list=JSON.parse(localStorage.getItem('MANMIN_UVAL_LIST')||'[]');}catch(_){}
      const si=list.findIndex(d=>d.part===part&&d.exposure===exposure);
      const payload={...data,ts:new Date().toISOString()};
      if(si>=0)list[si]=payload;else list.push(payload);
      localStorage.setItem('MANMIN_UVAL_LIST',JSON.stringify(list));
      localStorage.setItem('MANMIN_UVAL_LATEST',JSON.stringify(payload));
      const passStr=isPass?'✅ 적합':'❌ 기준 초과';
      if(confirm(`📤 RTS 부하계산서로 전송합니다.\n\n부위: ${part}\nU = ${currentU} W/m²K  ${passStr}\n기준: ${targetU?targetU.toFixed(3):'—'} W/m²K\n재료 레이어: ${calcLayers.length}개\n\nRTS 부하계산서를 새 탭으로 열겠습니까?`)){
        window.open(RTS_URL,'_blank');
      }
    }catch(e){alert('전송 오류: '+e.message);}
  };

  /* RTS 버튼 표시 */
  useEffect(()=>{
    const btn=document.getElementById('rts-btn');
    if(btn)btn.style.display=calcLayers.length>0?'flex':'none';
  },[calcLayers]);

  const exposureOptions=EXPOSURE_MAP[part]||['해당없음'];
  const usageOptions=USAGES_MAP[part]||['해당없음'];

  return(
    <main className="app-main">

        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>

          {/* 조건 선택 */}
          <div className="panel">
            <div className="panel-hd">
              <div className="panel-hd-icon">🗺️</div>
              <div><div className="panel-hd-title">검토 조건 선택</div><div className="panel-hd-sub">지역·부위·용도 설정</div></div>

              </div>

          <div className="limit-badge">
            <div>

            </div>
            <div style={{textAlign:'right'}}>

          </div>

          {/* 표면저항 */}

            <div className="panel-hd">
              <div className="panel-hd-icon">🏗️</div>

                <button className={`sr-btn${!directExp?' on':''}`} onClick={()=>setDirectExp(false)}>

              <div style={{display:'flex',gap:'8px'}}>

          {/* 탭 뷰 */}
          <div className="panel">
            <div className="panel-bd" style={{paddingBottom:'8px'}}>
              <div className="tabs">

                  <button key={k} className={`tab-btn${tab===k?' on':''}`} onClick={()=>setTab(k)}>{l}</button>

              {tab==='table'&&(

                        <td style={{color:'#1d4ed8',fontWeight:900,fontSize:'13px',textAlign:'right'}}>{sr.ro.toFixed(3)}</td>
                      </tr>
                      {calcLayers.map((l,i)=>(

                          <td style={{textAlign:'left',fontWeight:700,color:'#1a2744',fontSize:'12px'}}>
                            {(l.name||'').replace(/_/g,' ')}

                          </td>
                          <td style={{color:'#b45309',fontWeight:800}}>{(l.name||'').includes('공기층')?'—':l.t}</td>

                    </tbody>

                        <td colSpan={4} style={{textAlign:'right',fontSize:'10px',color:'#1e3a8a',fontWeight:800,letterSpacing:'.06em',textTransform:'uppercase',fontStyle:'italic'}}>Total Thermal Resistance (ΣR)</td>
                        <td style={{color:'#059669',fontSize:'16px'}}>{totalR.toFixed(3)}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}

              {/* 판정 */}
              {tab==='verdict'&&(
                <div>
                  <div className="verdict-grid">
                    <div className="vcard">

                      <div className="vcard-val" style={{fontSize:'18px',color:isPass&&layers.length>0?'#059669':'#e11d48'}}>
                        {layers.length===0?'미입력':isPass?'적  합':'부적합'}
                      </div>
                    </div>
                  </div>
                  {layers.length>0&&(
                    <div style={{background:isPass?'#f0fdf4':'#fff1f2',border:`1.5px solid ${isPass?'#bbf7d0':'#fecdd3'}`,borderRadius:'12px',padding:'14px',textAlign:'center'}}>
                      <div style={{fontSize:'32px',marginBottom:'8px'}}>{isPass?'✅':'❌'}</div>
                      <div style={{fontSize:'16px',fontWeight:900,color:isPass?'#059669':'#e11d48',marginBottom:'4px'}}>
                        {isPass?'단열 기준 적합':'단열 기준 초과'}
                      </div>
                      <div style={{fontSize:'11px',color:'#64748b'}}>
                        {isPass
                          ?`설계값 ${currentU} ≤ 기준 ${targetU?.toFixed(3)} W/m²K`
                          :`설계값 ${currentU} > 기준 ${targetU?.toFixed(3)} W/m²K — 단열 보강 필요`
                        }
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* 재료 DB */}
              {tab==='db'&&(
                <div>
                  <div className="notice" style={{marginBottom:'10px'}}>💡 재료명을 클릭하면 레이어 추가 창에 자동 입력됩니다.</div>
                  <div style={{maxHeight:'400px',overflowY:'auto'}}>
                    {Object.entries(DB).map(([catKey,cat])=>(
                      <div key={catKey} style={{marginBottom:'12px'}}>
                        <div style={{fontSize:'11px',fontWeight:900,color:'#1e3a8a',background:'#dbeafe',padding:'6px 10px',borderRadius:'6px',marginBottom:'6px'}}>{cat.label}</div>
                        {Object.entries(cat.groups).map(([gk,g])=>(
                          <div key={gk} style={{marginBottom:'6px'}}>
                            <div style={{fontSize:'10px',fontWeight:700,color:'#64748b',padding:'3px 8px',marginBottom:'4px'}}>{g.label}</div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                              {Object.entries(g.items).map(([n,lambda])=>(
                                <button key={n} onClick={()=>{setAddName(n);setAddLambda(lambda.toString());setShowAdd(true);setTab('table');}}
                                  style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'6px',padding:'4px 8px',fontSize:'10px',cursor:'pointer',fontFamily:'inherit',transition:'all .1s',whiteSpace:'nowrap'}}
                                  title={`λ = ${lambda}`}
                                  onMouseEnter={e=>e.target.style.borderColor='#93c5fd'}
                                  onMouseLeave={e=>e.target.style.borderColor='#e2e8f0'}
                                >
                                  {n} <span style={{color:lambdaColor(lambda),fontFamily:'var(--mono)',fontWeight:800}}>{lambda.toFixed(3)}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* RTS 연동 카드 */}
          <div style={{
            background:'linear-gradient(135deg,#2e1065,#4c1d95)',
            borderRadius:'var(--r-lg)',padding:'16px 18px',
            display:'flex',alignItems:'center',gap:'14px',
            boxShadow:'0 4px 20px rgba(124,58,237,.3)',
            border:'1px solid rgba(196,181,253,.2)',
          }}>
            <div style={{
              width:44,height:44,borderRadius:12,flexShrink:0,
              background:'rgba(196,181,253,.15)',
              border:'1px solid rgba(196,181,253,.3)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,
            }}>📊</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:900,color:'#e9d5ff',marginBottom:3}}>RTS 부하계산서 연계</div>
              <div style={{fontSize:10,color:'rgba(196,181,253,.7)',lineHeight:1.5}}>
                U값 산출 후 전송 버튼 → RTS에서 자동 수신
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
              <button className="rts-link-btn"
                style={{fontSize:11,padding:'6px 12px'}}
                onClick={()=>window.open(RTS_URL,'_blank')}>
                RTS 열기 ↗
              </button>
              {calcLayers.length>0&&(
                <button className="rts-link-btn"
                  style={{fontSize:11,padding:'6px 12px',background:'rgba(249,115,22,.25)',borderColor:'rgba(249,115,22,.5)',color:'#fed7aa'}}
                  onClick={()=>window.triggerRTS&&window.triggerRTS()}>
                  📤 U값 전송
                </button>
              )}
            </div>
          </div>

          {/* 하단 여백 */}
          <div style={{height:'8px'}}/>
        </div>
      </div>

      {/* FAB 도움말 */}
      <button className="fab-pill no-print" onClick={()=>setShowModal(true)}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        이용방법 · 관련자료
      </button>

      {/* 도움말 모달 */}
      {showModal&&<HelpModal onClose={()=>setShowModal(false)}/>}
    </main>
  );
}

<!-- ═══ PWA ═══ -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(function(r){console.log('[PWA] SW:',r.scope);})
      .catch(function(e){console.warn('[PWA]',e);});
  });
}
(function(){
  var deferred=null;
  var _isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var _isSA=window.matchMedia('(display-mode:standalone)').matches||!!navigator.standalone;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferred=e;
    var btn=document.getElementById('pwa-install-btn');
    if(btn)btn.classList.add('visible');
    if(!sessionStorage.getItem('pwa-dismissed')&&!_isSA){
      setTimeout(function(){var b=document.getElementById('pwa-banner');if(b)b.classList.add('visible');},2500);
    }
  });
  document.addEventListener('DOMContentLoaded',function(){
    if(_isIOS&&!_isSA){
      var btn=document.getElementById('pwa-install-btn');
      if(btn)btn.classList.add('visible');
      if(!sessionStorage.getItem('pwa-dismissed')){
        setTimeout(function(){var m=document.getElementById('ios-modal');if(m)m.classList.add('show');},2500);
      }
    }
    if(_isSA){var btn=document.getElementById('pwa-install-btn');if(btn)btn.style.display='none';}
  });
  window.pwaTriggerInstall=function(){
    var b=document.getElementById('pwa-banner');if(b)b.classList.remove('visible');
    if(_isIOS&&!_isSA){var m=document.getElementById('ios-modal');if(m)m.classList.add('show');return;}
    var prompt=deferred;
    if(!prompt){alert('📱 브라우저 메뉴 → 앱 설치 / 홈 화면에 추가');return;}
    prompt.prompt();
    prompt.userChoice.then(function(r){
      if(r.outcome==='accepted'){var btn=document.getElementById('pwa-install-btn');if(btn)btn.classList.remove('visible');}
      deferred=null;
    });
  };
  window.pwaDismiss=function(){
    var b=document.getElementById('pwa-banner');
    if(b){b.style.transition='transform .3s,opacity .25s';b.style.transform='translateY(110%)';b.style.opacity='0';setTimeout(function(){b.classList.remove('visible');b.style='';},330);}
    try{sessionStorage.setItem('pwa-dismissed','1');}catch(e){}
  };
  window.addEventListener('appinstalled',function(){
    var btn=document.getElementById('pwa-install-btn');var b=document.getElementById('pwa-banner');
    if(btn)btn.classList.remove('visible');if(b)b.classList.remove('visible');deferred=null;
  });
})();
</script>

</body>
</html>
